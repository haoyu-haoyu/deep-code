      - name: TUI harness tests
        run: cd packages/deep-code && bun test test/tui-deepseek.test.mjs
        continue-on-error: true # bun harness can be flaky on CI; non-blocking

      - name: Type-check (tsc)
        # Non-blocking for now: the repo never had a tsconfig, so there is a large
        # pre-existing baseline (see packages/deep-code/TYPECHECK.md). This surfaces
        # the error count in the log; flip to a `--max-errors=<baseline>` ratchet
        # once deps are declared (#11) and the count is reproducible in CI.
        # typescript isn't a declared dep yet (deps:{} + stale lockfile), so it's
        # installed ad-hoc with --no-save here — this does NOT touch the lockfile,
        # so the earlier `npm ci` strict check is unaffected.
        run: |
          cd packages/deep-code
          npm i typescript@5.6.3 --no-save --no-audit --no-fund || true
          npm run typecheck
        continue-on-error: true

  perf-baseline:
    name: Perf baseline + regression gate
    runs-on: ubuntu-latest
    # Only run on PRs so we can compare against the base branch.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head (merge commit when available)
        uses: actions/checkout@v4
        # Default github.sha for pull_request events is the test-merge
        # commit (PR branch merged into base), so the perf numbers
        # reflect what would actually be merged — not the head-branch
        # tip in isolation. Falls back to head.sha when GitHub couldn't
        # produce a clean merge commit (conflicts), matching the
        # behavior of opening the PR in the UI.
        with:
          ref: ${{ github.sha }}
          path: head

      - name: Checkout PR base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install head dependencies
        working-directory: head
        run: npm ci --no-audit --no-fund

      - name: Install base dependencies
        working-directory: base
        run: npm ci --no-audit --no-fund

      # Detect whether base has the perf infrastructure. The first PR that
      # introduces this workflow lands a base (main) that predates the
      # `perf:fixture` / `perf:baseline` scripts and `scripts/perf-baseline.mjs`.
      # Without this guard, the gate self-destructs on the very PR that
      # creates it (and on any future PR whose base is older than the perf
      # infra). Skip-with-success in that case so the PR isn't held up.
      - name: Detect perf infra on base
        id: base-perf
        working-directory: base/packages/deep-code
        shell: bash
        run: |
          if [ -f scripts/perf-baseline.mjs ] && \
             node -e "process.exit(require('./package.json').scripts['perf:fixture'] ? 0 : 1)"
          then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::perf-baseline gate skipped: base lacks perf:fixture or scripts/perf-baseline.mjs (likely the first PR introducing the gate)"
          fi

      - name: Generate fixture (head)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: head/packages/deep-code
        run: npm run perf:fixture

      - name: Generate fixture (base)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: base/packages/deep-code
        run: npm run perf:fixture

      - name: Run perf baseline (base)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: base/packages/deep-code
        run: bun scripts/perf-baseline.mjs --json=/tmp/perf-base.json --repeats=3

      - name: Run perf baseline (head)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: head/packages/deep-code
        run: bun scripts/perf-baseline.mjs --json=/tmp/perf-head.json --repeats=3

      - name: Compare and gate
        if: steps.base-perf.outputs.available == 'true'
        working-directory: head/packages/deep-code
        # Explicit `bash` shell + `pipefail` so a non-zero exit from
        # perf-compare.mjs propagates through the `tee` pipe. The
        # default GitHub-Actions shell runs as `bash -e` WITHOUT
        # pipefail, which would mask the script's exit code and let
        # regressions slip through silently.
        shell: bash
        run: |
          set -o pipefail
          node scripts/perf-compare.mjs \
            --base=/tmp/perf-base.json \
            --head=/tmp/perf-head.json \
            --threshold=0.20 \
            --json=/tmp/perf-diff.json | tee /tmp/perf-diff.txt

      - name: Upload perf artifacts
        if: always() && steps.base-perf.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-diff
          path: |
            /tmp/perf-base.json
            /tmp/perf-head.json
            /tmp/perf-diff.json
            /tmp/perf-diff.txt
          retention-days: 14

      - name: Comment perf diff on PR
        if: always() && github.event_name == 'pull_request' && steps.base-perf.outputs.available == 'true'
        # Forked PRs and Dependabot get a read-only GITHUB_TOKEN, so
        # the comment API will 403. continue-on-error keeps the
        # perf-baseline job result determined by the regression gate
        # (the previous step) and not by whether we could publish
        # the comment. Same-repo PRs continue to receive the comment.
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let body = '⚠️ Could not read perf diff'
            try {
              body = fs.readFileSync('/tmp/perf-diff.txt', 'utf8')
            } catch (e) {
              body = `Perf diff unavailable: ${e.message}`
            }
            const marker = '<!-- deepcode-perf-diff -->'
            const tagged = `${marker}\n## Perf baseline diff\n\n\`\`\`\n${body}\n\`\`\``
            try {
              // Paginate through ALL comments — the default per_page
              // is 30, so on a long-running PR our marker comment
              // can fall off page 1 and we'd post a duplicate
              // instead of updating. github.paginate handles all
              // pages with the same params.
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                },
              )
              const existing = comments.find(
                c =>
                  c.body &&
                  c.body.startsWith(marker) &&
                  c.user &&
                  (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]'),
              )
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: tagged,
                })
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: tagged,
                })
              }
            } catch (err) {
              // Forked-PR / Dependabot 403 lands here; not a
              // regression in the code under test, just the runner
              // not having permission to comment. Log + carry on.
              core.warning(`Perf comment skipped: ${err.message}`)
            }
