name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Run native + package tests
        run: |
          cd packages/deep-code
          shopt -s nullglob
          node --test \
            test/deepcode-native.test.mjs \
            test/deepcode-package.test.mjs \
            test/perf-baseline.test.mjs \
            test/s3-render-perf.test.mjs \
            test/s2-streaming-text.test.mjs \
            test/a2-bash-polling.test.mjs \
            test/a2-bash-polling-core.test.mjs \
            test/a4-paste-cleanup.test.mjs \
            test/tokenizer-meta-input.test.mjs \
            test/bash-command-stripping.test.mjs \
            test/bash-command-text.test.mjs \
            test/compact-boundary.test.mjs \
            test/s1-tool-streaming.test.mjs \
            test/s4-streaming-resume.test.mjs \
            test/p2-1-auto-mode.test.mjs \
            test/p2-2-providers.test.mjs \
            test/openai-compatible-stream.test.mjs \
            test/runtime-provider.test.mjs \
            test/deepseek-thinking.test.mjs \
            test/dsh-reasoning-effort-ladder.test.mjs \
            test/dsh-effort-clamp.test.mjs \
            test/usage-input-remainder.test.mjs \
            test/p2-3-cache.test.mjs \
            test/p2-3-cache-sim.test.mjs \
            test/dsh-schema-hint-stable.test.mjs \
            test/p2-4-snapshot.test.mjs \
            test/p2-5-lsp.test.mjs \
            test/p2-6-serve.test.mjs \
            test/p2-7-fork.test.mjs \
            test/session-list.test.mjs \
            test/session-detail.test.mjs \
            test/p2-8-doctor.test.mjs \
            test/p2-9-workspace-slash.test.mjs \
            test/p2-10-i18n.test.mjs \
            test/p2-10-render.test.mjs \
            test/p2-10-b1-messages.test.mjs \
            test/p2-10-b2-prompt-settings.test.mjs \
            test/p2-10-e-locale.test.mjs \
            test/p2-10-i18n-guard.test.mjs \
            test/p2-12-codegraph.test.mjs \
            test/p2-12-codegraph-tool.test.mjs \
            test/p2-14-plan-todos.test.mjs \
            test/p2-15-model-catalog.test.mjs \
            test/frontmatter-model.test.mjs \
            test/context-policy-max-tokens.test.mjs \
            test/p2-16-acp.test.mjs \
            test/p2-17-acp-agent.test.mjs \
            test/p2-17-acp-permission.test.mjs \
            test/p3-1-release.test.mjs \
            test/p3-2-docker.test.mjs \
            test/p3-3-binaries.test.mjs \
            test/p3-4-live-e2e.test.mjs \
            test/phase5-perf-compare.test.mjs \
            test/phase5-ci-workflow.test.mjs \
            test/a1-mcp-nonblocking.test.mjs \
            test/sanitization.test.mjs \
            test/redact.test.mjs \
            test/read-text-result-classify.test.mjs \
            test/file-encoding.test.mjs \
            test/sed-validation.test.mjs \
            test/argv-wrapper-stripping.test.mjs \
            test/sed-edit-parser.test.mjs \
            test/readonly-flag-parsing.test.mjs \
            test/tool-batch-concurrency.test.mjs \
            test/cost-status.test.mjs \
            test/task-output-truncate.test.mjs \
            test/hook-if-condition-events.test.mjs \
            test/hook-output-blocks.test.mjs \
            test/violation-feedback-tail.test.mjs \
            test/disk-shell-snapshot-cleanup.test.mjs \
            test/disk-snapshot-store-reclaim.test.mjs \
            test/async-mutex.test.mjs \
            test/keychain-argv.test.mjs \
            test/worktree-lsfiles-args.test.mjs \
            test/settings-source-order.test.mjs \
            test/permission-rule-classify.test.mjs \
            test/edit-delete-occurrences.test.mjs \
            test/edit-quote-variant-underreplace.test.mjs \
            test/reconcile-patch-edits.test.mjs \
            test/utf8-tail.test.mjs \
            test/word-diff-guard.test.mjs \
            test/escape-for-diff.test.mjs \
            test/paste-id.test.mjs \
            test/bom-handling.test.mjs \
            test/todo-resume-collapse.test.mjs \
            test/filesuggestions-ignore.test.mjs \
            test/mcp-env-default-split.test.mjs \
            test/mcp-result-persistid.test.mjs \
            test/mcp-error-text.test.mjs \
            test/preserve-quote-style.test.mjs \
            test/notebook-staleness.test.mjs \
            test/read-line-offsets.test.mjs \
            test/sandbox-fortress/unit/*.test.mjs \
            test/sandbox-fortress/integration/*.test.mjs \
            test/sandbox-fortress/redteam/*.test.mjs

      - name: TUI harness tests
        run: cd packages/deep-code && bun test test/tui-deepseek.test.mjs
        continue-on-error: true # bun harness can be flaky on CI; non-blocking

  perf-baseline:
    name: Perf baseline + regression gate
    runs-on: ubuntu-latest
    # Only run on PRs so we can compare against the base branch.
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout PR head (merge commit when available)
        uses: actions/checkout@v4
        # Default github.sha for pull_request events is the test-merge
        # commit (PR branch merged into base), so the perf numbers
        # reflect what would actually be merged — not the head-branch
        # tip in isolation. Falls back to head.sha when GitHub couldn't
        # produce a clean merge commit (conflicts), matching the
        # behavior of opening the PR in the UI.
        with:
          ref: ${{ github.sha }}
          path: head

      - name: Checkout PR base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install head dependencies
        working-directory: head
        run: npm ci --no-audit --no-fund

      - name: Install base dependencies
        working-directory: base
        run: npm ci --no-audit --no-fund

      # Detect whether base has the perf infrastructure. The first PR that
      # introduces this workflow lands a base (main) that predates the
      # `perf:fixture` / `perf:baseline` scripts and `scripts/perf-baseline.mjs`.
      # Without this guard, the gate self-destructs on the very PR that
      # creates it (and on any future PR whose base is older than the perf
      # infra). Skip-with-success in that case so the PR isn't held up.
      - name: Detect perf infra on base
        id: base-perf
        working-directory: base/packages/deep-code
        shell: bash
        run: |
          if [ -f scripts/perf-baseline.mjs ] && \
             node -e "process.exit(require('./package.json').scripts['perf:fixture'] ? 0 : 1)"
          then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::perf-baseline gate skipped: base lacks perf:fixture or scripts/perf-baseline.mjs (likely the first PR introducing the gate)"
          fi

      - name: Generate fixture (head)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: head/packages/deep-code
        run: npm run perf:fixture

      - name: Generate fixture (base)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: base/packages/deep-code
        run: npm run perf:fixture

      - name: Run perf baseline (base)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: base/packages/deep-code
        run: bun scripts/perf-baseline.mjs --json=/tmp/perf-base.json --repeats=3

      - name: Run perf baseline (head)
        if: steps.base-perf.outputs.available == 'true'
        working-directory: head/packages/deep-code
        run: bun scripts/perf-baseline.mjs --json=/tmp/perf-head.json --repeats=3

      - name: Compare and gate
        if: steps.base-perf.outputs.available == 'true'
        working-directory: head/packages/deep-code
        # Explicit `bash` shell + `pipefail` so a non-zero exit from
        # perf-compare.mjs propagates through the `tee` pipe. The
        # default GitHub-Actions shell runs as `bash -e` WITHOUT
        # pipefail, which would mask the script's exit code and let
        # regressions slip through silently.
        shell: bash
        run: |
          set -o pipefail
          node scripts/perf-compare.mjs \
            --base=/tmp/perf-base.json \
            --head=/tmp/perf-head.json \
            --threshold=0.20 \
            --json=/tmp/perf-diff.json | tee /tmp/perf-diff.txt

      - name: Upload perf artifacts
        if: always() && steps.base-perf.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline-diff
          path: |
            /tmp/perf-base.json
            /tmp/perf-head.json
            /tmp/perf-diff.json
            /tmp/perf-diff.txt
          retention-days: 14

      - name: Comment perf diff on PR
        if: always() && github.event_name == 'pull_request' && steps.base-perf.outputs.available == 'true'
        # Forked PRs and Dependabot get a read-only GITHUB_TOKEN, so
        # the comment API will 403. continue-on-error keeps the
        # perf-baseline job result determined by the regression gate
        # (the previous step) and not by whether we could publish
        # the comment. Same-repo PRs continue to receive the comment.
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            let body = '⚠️ Could not read perf diff'
            try {
              body = fs.readFileSync('/tmp/perf-diff.txt', 'utf8')
            } catch (e) {
              body = `Perf diff unavailable: ${e.message}`
            }
            const marker = '<!-- deepcode-perf-diff -->'
            const tagged = `${marker}\n## Perf baseline diff\n\n\`\`\`\n${body}\n\`\`\``
            try {
              // Paginate through ALL comments — the default per_page
              // is 30, so on a long-running PR our marker comment
              // can fall off page 1 and we'd post a duplicate
              // instead of updating. github.paginate handles all
              // pages with the same params.
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  per_page: 100,
                },
              )
              const existing = comments.find(
                c =>
                  c.body &&
                  c.body.startsWith(marker) &&
                  c.user &&
                  (c.user.type === 'Bot' || c.user.login === 'github-actions[bot]'),
              )
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: tagged,
                })
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: tagged,
                })
              }
            } catch (err) {
              // Forked-PR / Dependabot 403 lands here; not a
              // regression in the code under test, just the runner
              // not having permission to comment. Log + carry on.
              core.warning(`Perf comment skipped: ${err.message}`)
            }
