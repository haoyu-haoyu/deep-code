name: Live E2E (DeepSeek)

# Live, NON-BLOCKING end-to-end validation against the real DeepSeek API.
# Deliberately NOT triggered on pull_request / push — it needs a real API key
# (cost + secret), so it runs on manual dispatch and a nightly schedule only.
# Every job is guarded on the DEEPSEEK_API_KEY secret: when the secret is
# absent (e.g. a fork) the live steps skip with a notice instead of failing.
on:
  workflow_dispatch:
  schedule:
    # Nightly at 07:00 UTC.
    - cron: '0 7 * * *'

concurrency:
  group: live-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-e2e:
    name: Live DeepSeek probes (cache, reasoning, tool-chain, ACP)
    runs-on: ubuntu-latest
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      # Skip-with-notice when the key secret is not configured, so the nightly
      # run on an unconfigured fork is green rather than a false failure.
      - name: Guard on API key secret
        id: guard
        shell: bash
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Live E2E skipped: DEEPSEEK_API_KEY secret is not configured."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prefix-cache cold→warm E2E (cache hit rate)
        if: steps.guard.outputs.run == 'true'
        working-directory: packages/deep-code
        env:
          DEEPCODE_REAL_E2E: '1'
        run: npm run test:real-cache-e2e

      - name: Reasoning-replay cost probe
        if: steps.guard.outputs.run == 'true'
        working-directory: packages/deep-code
        env:
          DEEPCODE_REAL_E2E: '1'
        run: npm run test:reasoning-cost

      - name: Tool-chain E2E (Read → Edit → Write → Bash)
        if: steps.guard.outputs.run == 'true'
        working-directory: packages/deep-code
        env:
          DEEPCODE_REAL_E2E: '1'
        run: npm run test:toolchain-e2e

      - name: ACP allow_always + Write E2E
        if: steps.guard.outputs.run == 'true'
        working-directory: packages/deep-code
        env:
          DEEPCODE_REAL_E2E: '1'
        run: npm run test:acp-e2e

  binary-smoke:
    name: Binary build + live-query smoke (darwin-arm64)
    runs-on: macos-14
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      # Builds the inline bundle, bun --compiles the arm64 target, and smoke
      # tests `--version` (exit 0 + no "Cannot find package"). This is the real
      # bun --compile path that CI never otherwise exercises.
      - name: Build + smoke darwin-arm64 binary
        working-directory: packages/deep-code
        env:
          DEEPCODE_BINARY_TARGET: bun-darwin-arm64
        run: npm run build:binaries

      - name: Guard on API key secret
        id: guard
        shell: bash
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Binary live-query smoke skipped: DEEPSEEK_API_KEY secret is not configured."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Live query through the compiled binary
        if: steps.guard.outputs.run == 'true'
        working-directory: packages/deep-code
        shell: bash
        run: |
          out=$(./binaries/deepcode-darwin-arm64 -p "Reply with exactly: binary-live-ok")
          echo "binary replied: $out"
          echo "$out" | grep -q "binary-live-ok"

  sandbox-network:
    name: Sandbox network-deny enforcement (Linux + bubblewrap)
    # Needs the OS sandbox (bubblewrap), NOT the DeepSeek key — so this job is
    # gated on the sandbox being available, not on a secret. The probe itself
    # self-skips (exit 0) when the platform/deps are unavailable, so it is
    # never a false failure.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      # bubblewrap + socat are the Linux OS-sandbox primitives the runtime needs
      # for real network-namespace + proxy enforcement (the in-app dependency
      # contract checks for both — see sandbox-fortress/sandboxAvailability.mjs).
      # Without either, checkDependencies() flags an error and the probe self-skips,
      # so the job would stay green without exercising enforcement. Install both.
      - name: Install bubblewrap + socat
        run: sudo apt-get update && sudo apt-get install -y bubblewrap socat

      # The real @anthropic-ai/sandbox-runtime is a closed-source, self-use-only
      # dependency (docs/sandbox-runtime-distribution.md): the committed tree ships
      # a NO-OP shim so normal builds never bundle it, and it is not in the
      # lockfile, so `npm ci` leaves it absent. Installing it here is self-use CI
      # testing (NOT publishing), which the policy allows, and it gives the probe
      # the REAL runtime instead of the shim. This step HARD-FAILS on error: if the
      # runtime can't be installed the probe would silently self-skip, so the job
      # must go RED (this is a non-blocking nightly, so a red run is a visible
      # "could not exercise enforcement" signal, never a PR gate).
      - name: Install the real sandbox-runtime (self-use test only)
        run: npm install --no-save @anthropic-ai/sandbox-runtime@0.0.52

      # Fail loudly (not skip silently) on every prerequisite the probe would
      # otherwise self-skip on, so this job can never go green without exercising
      # enforcement:
      #   - the bare import must resolve to the REAL runtime, not the no-op shim
      #     (the shim hard-codes isSupportedPlatform()===false; the real runtime
      #     returns true on this Linux runner), and
      #   - checkDependencies() must report no errors (bubblewrap/socat present),
      #     mirroring the probe's own dep gate but turning a silent skip into a
      #     loud fail BEFORE the probe runs.
      - name: Verify the real runtime resolves (not the shim) and deps are satisfied
        working-directory: packages/deep-code
        run: |
          node --input-type=module -e "
            const m = await import('@anthropic-ai/sandbox-runtime');
            const SM = m.SandboxManager;
            if (typeof SM?.isSupportedPlatform !== 'function' || SM.isSupportedPlatform() !== true) {
              console.error('real sandbox-runtime not active (got the no-op shim or an unsupported platform); cannot exercise enforcement');
              process.exit(1);
            }
            const deps = SM.checkDependencies?.() ?? { errors: [] };
            if ((deps.errors ?? []).length > 0) {
              console.error('sandbox dependency errors on the runner (probe would self-skip): ' + JSON.stringify(deps.errors));
              process.exit(1);
            }
            console.log('real sandbox-runtime resolved, platform supported, deps satisfied');
          "

      # STRICT: the preflight above already proved real-runtime + supported
      # platform + deps, so here a "can't run" is no longer a harmless skip — it is
      # a failure of the thing under test. STRICT makes post-preflight setup/init
      # problems and a sandbox that blocks an allowed host HARD-FAIL, so this job
      # is truly "exercise enforcement or go red" (only an external host outage
      # still skips). It is a non-blocking nightly, so a red run is the right signal.
      - name: Sandbox network-deny E2E (denied host refused, allowed control connects)
        working-directory: packages/deep-code
        env:
          DEEPCODE_REAL_E2E: '1'
          DEEPCODE_SANDBOX_E2E_STRICT: '1'
        run: npm run test:sandbox-network-e2e
