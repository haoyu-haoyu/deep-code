name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  pack-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install
        run: npm ci

      - name: Build full CLI bundle
        run: cd packages/deep-code && bun run build:full-cli

      - name: npm pack (dry validation)
        run: cd packages/deep-code && npm pack --dry-run

      - name: Generate tarball
        run: cd packages/deep-code && npm pack

      - name: Validate tarball contents
        run: |
          cd packages/deep-code
          tar -tzf deepcode-ai-deep-code-*.tgz | sort > /tmp/tarball-contents.txt
          cat /tmp/tarball-contents.txt

      - name: Assert required files in tarball
        run: |
          cd packages/deep-code
          tarfile=$(ls deepcode-ai-deep-code-*.tgz)
          tar -tzf "$tarfile" | grep -q 'package/dist/deepcode-full.mjs' || { echo "Missing dist/deepcode-full.mjs"; exit 1; }
          tar -tzf "$tarfile" | grep -q 'package/deepcode.js' || { echo "Missing deepcode.js"; exit 1; }
          tar -tzf "$tarfile" | grep -q 'package/package.json' || { echo "Missing package.json"; exit 1; }
          tar -tzf "$tarfile" | grep -q 'package/LICENSE.md' || echo "WARN: LICENSE.md not in tarball (may be intentional)"

      # === Real publish step disabled until P3.1.b/c ===
      # - name: npm publish
      #   run: cd packages/deep-code && npm publish --access public --provenance
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  docker-publish:
    runs-on: ubuntu-latest
    needs: pack-and-validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/haoyu-haoyu/deepcode:${{ steps.version.outputs.version }}
            ghcr.io/haoyu-haoyu/deepcode:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =============================================================
# Binary distribution (single-binary via bun --compile)
# =============================================================
# P3.3 originally deferred this. scripts/build-full-cli.mjs externalizes
# pure-JS deps (cssfilter, etc.) to keep the npm tarball lean, but
# `bun --compile` produces a self-contained exe with no runtime node_modules,
# so those externals failed to resolve ("Cannot find package 'cssfilter'").
#
# Fixed via a dual bundle (P2.13): `build:full-cli-inline` inlines the installed
# pure-JS deps and stubs optional/native/stripped-feature modules, producing
# dist/deepcode-full-inline.mjs which `bun --compile` consumes. The lean
# dist/deepcode-full.mjs shipped to npm is unchanged. `build:binaries` compiles
# each target from the inline bundle and smoke-tests it (--version must succeed
# and must not print "Cannot find package"), so a broken binary fails the job
# instead of shipping. Windows (bun --compile support unstable) and linux/arm64
# (no bun target — Docker covers it) are intentionally not built here.
# =============================================================
  build-binaries:
    runs-on: ${{ matrix.os }}
    needs: pack-and-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          # Explicit native runners (not macos-latest, which is now arm64) so
          # each target's smoke gate runs on matching hardware: macos-13=Intel,
          # macos-14=Apple Silicon.
          - os: ubuntu-latest
            target: bun-linux-x64
            name: deepcode-linux-x64
          - os: macos-13
            target: bun-darwin-x64
            name: deepcode-darwin-x64
          - os: macos-14
            target: bun-darwin-arm64
            name: deepcode-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install
        run: npm ci

      # Builds the self-contained inline bundle, compiles the matrix target, and
      # smoke-tests the binary (the gate fails on any unresolved dependency).
      - name: Build + smoke binary
        run: cd packages/deep-code && DEEPCODE_BINARY_TARGET=${{ matrix.target }} npm run build:binaries

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: packages/deep-code/binaries/${{ matrix.name }}

  create-release:
    runs-on: ubuntu-latest
    needs: build-binaries
    permissions:
      contents: write
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # Flatten per-artifact directories and publish a SHA256SUMS manifest
      # alongside the binaries so downloads can be verified.
      - name: Collect binaries + checksums
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release
          shasum -a 256 deepcode-* > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
